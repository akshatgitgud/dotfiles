# Zen Browser - workspace 2
windowrule = workspace 1 , match:class ^(zen|zen-alpha|zen-beta)$
windowrule = workspace 2 silent, match:class ^(Spotify)$
windowrule = workspace 3 silent, match:class ^(steam)$
# windowrule = workspace 2 silent, match:class ^(codium)$
windowrule = fullscreen on, match:class ^(zen|zen-alpha|zen-beta)$

